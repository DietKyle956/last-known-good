name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Import constraint check
        run: ./.github/check-imports.sh
